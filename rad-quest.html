<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RAD Quest — Radiology Training Game</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050a0f;font-family:'Courier New',monospace;overflow-x:hidden}
@keyframes twinkle{from{opacity:0.1}to{opacity:0.8}}
@keyframes scanline{0%{top:-10%}100%{top:110%}}
@keyframes flicker{0%,100%{opacity:1}92%{opacity:1}93%{opacity:0.8}94%{opacity:1}96%{opacity:0.9}97%{opacity:1}}
@keyframes glitch{0%{text-shadow:2px 0 #ff0040,-2px 0 #00e5ff}25%{text-shadow:-2px 0 #ff0040,2px 0 #00e5ff}50%{text-shadow:2px 0 #00e5ff,-2px 0 #ff0040}100%{text-shadow:2px 0 #ff0040,-2px 0 #00e5ff}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(0.5);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
@keyframes marquee{from{transform:translateX(100%)}to{transform:translateX(-100%)}}
@keyframes streakPop{0%{transform:translateX(-50%) scale(0);opacity:0}60%{transform:translateX(-50%) scale(1.15);opacity:1}100%{transform:translateX(-50%) scale(1);opacity:1}}
@keyframes radBurst{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
@keyframes heartbeat{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes sceneFade{from{opacity:0}to{opacity:1}}
.choice-btn:hover:not(:disabled){transform:translateY(-2px);filter:brightness(1.2)}
.choice-btn:active:not(:disabled){transform:scale(0.97)}
.retro-input{background:transparent;border:none;border-bottom:2px solid #00e5ff;color:#00e5ff;font-family:'Courier New',monospace;font-size:1.3rem;font-weight:900;letter-spacing:3px;outline:none;text-align:center;width:100%;padding:8px 0;caret-color:#00e5ff}
.retro-input::placeholder{color:#00e5ff33}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// ── SOUND ────────────────────────────────────────────────────────────────────
function makeSfx(){
  let ctx=null;
  const ac=()=>{if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();return ctx};
  const o=(type,freq,t,dur,vol,endFreq)=>{
    const c=ac(),os=c.createOscillator(),g=c.createGain();
    os.type=type;os.frequency.setValueAtTime(freq,t);
    if(endFreq)os.frequency.exponentialRampToValueAtTime(endFreq,t+dur);
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    os.connect(g);g.connect(c.destination);os.start(t);os.stop(t+dur);
  };
  return{
    click(){const c=ac(),n=c.currentTime;o("square",880,n,0.05,0.07);o("square",1100,n+0.03,0.05,0.05)},
    correct(){const c=ac(),n=c.currentTime;[523,659,784,1047].forEach((f,i)=>o("sine",f,n+i*0.07,0.22,0.12));o("triangle",2093,n+0.1,0.28,0.06)},
    wrong(){const c=ac(),n=c.currentTime;o("sawtooth",220,n,0.12,0.14);o("sawtooth",160,n+0.1,0.16,0.1);o("square",100,n+0.2,0.18,0.08)},
    radiation(){const c=ac(),n=c.currentTime;o("sine",200,n,0.3,0.06,800);o("triangle",400,n+0.1,0.2,0.05,100)},
    alarm(){const c=ac(),n=c.currentTime;[440,440,440].forEach((_,i)=>{o("sawtooth",880,n+i*0.15,0.1,0.1);o("sawtooth",660,n+i*0.15+0.05,0.08,0.08)})},
    fanfare(){const c=ac(),n=c.currentTime;[[392,0],[523,.1],[659,.2],[784,.3],[1047,.45]].forEach(([f,t])=>o("sine",f,n+t,0.25,0.11));[[196,0],[196,.3]].forEach(([f,t])=>o("triangle",f,n+t,0.28,0.09))},
    type(){const c=ac(),n=c.currentTime;o("square",400+Math.random()*300,n,0.03,0.04)},
    scenario(){const c=ac(),n=c.currentTime;o("sine",300,n,0.25,0.07,600);o("triangle",150,n+0.1,0.2,0.05)},
  };
}
let _sfx=null;const sfx=()=>{if(!_sfx)_sfx=makeSfx();return _sfx};

// ── DATA ─────────────────────────────────────────────────────────────────────
const QUESTIONS=[
  // FROM PDF — exact questions
  {id:"q1",type:"mc",category:"Radiation Syndromes",difficulty:"medium",
   stem:"Of the following early somatic effects, which one is known as 'Bone Marrow Syndrome' and can decrease the total number of blood cells, resulting in possible death?",
   options:["Hematopoietic Syndrome","Gastrointestinal (GI) Syndrome","Central Nervous System Syndrome","Transporter Psychosis Syndrome"],
   correct:0,
   explanation:"Hematopoietic Syndrome (also called Bone Marrow Syndrome) occurs at doses of 1–6 Gy. It destroys blood-forming cells in the bone marrow, leading to decreased white blood cells, red blood cells, and platelets — potentially causing fatal infections or hemorrhage."},

  {id:"q2",type:"mc",category:"Radiation Interactions",difficulty:"medium",
   stem:"What type of interaction is responsible for most diagnostic x-ray damage in the human body?",
   options:["Indirect interaction through radiolysis of water","Direct interaction with DNA","Direct collision with bone marrow","Double-strand breaks which may not be easily repaired"],
   correct:0,
   explanation:"About 70–80% of radiation damage in the body is INDIRECT — x-ray photons ionize water molecules (radiolysis), creating free radicals (like OH•) that then damage DNA and cellular structures. This is why the body's high water content makes it vulnerable."},

  // EXPANDED CONTENT — same topics
  {id:"q3",type:"mc",category:"Radiation Syndromes",difficulty:"hard",
   stem:"At what approximate radiation dose range does Gastrointestinal (GI) Syndrome typically occur?",
   options:["6–10 Gy","0.5–1 Gy","Greater than 50 Gy","1–2 Gy"],
   correct:0,
   explanation:"GI Syndrome occurs at doses of approximately 6–10 Gy. At these levels, cells lining the GI tract are destroyed, leading to nausea, vomiting, diarrhea, and loss of the intestinal barrier — allowing bacteria to enter the bloodstream."},

  {id:"q4",type:"mc",category:"Radiation Syndromes",difficulty:"hard",
   stem:"Central Nervous System (CNS) Syndrome is characterized by which of the following outcomes?",
   options:["Death within hours to days — always fatal","Full recovery within 2 weeks","Decreased white blood cell count only","Reversible damage to the spinal cord"],
   correct:0,
   explanation:"CNS Syndrome occurs at doses exceeding 50 Gy. It is always fatal, typically within hours to days. Symptoms include disorientation, loss of consciousness, and cardiovascular collapse. No treatment can reverse CNS Syndrome."},

  {id:"q5",type:"mc",category:"Radiation Biology",difficulty:"medium",
   stem:"Which cellular component is considered the primary critical target for radiation-induced cell death?",
   options:["DNA in the cell nucleus","The cell membrane","Mitochondria","Ribosomes"],
   correct:0,
   explanation:"DNA is the primary critical target. Damage to DNA — especially double-strand breaks — disrupts cell replication and can lead to cell death, mutation, or carcinogenesis. Other cellular components can be replaced, but significant DNA damage is often irreparable."},

  {id:"q6",type:"mc",category:"Radiation Interactions",difficulty:"medium",
   stem:"Free radicals produced during radiolysis of water are dangerous because they:",
   options:["Are highly reactive and can damage DNA and proteins","Are stable molecules that accumulate in tissue","Directly ionize atomic nuclei","Cannot penetrate the cell membrane"],
   correct:0,
   explanation:"Free radicals (like hydroxyl radical OH•) are extremely reactive unstable molecules. They can break chemical bonds in DNA, proteins, and lipids — causing indirect radiation damage. Their short lifespan (microseconds) means damage occurs rapidly near the site of ionization."},

  {id:"q7",type:"mc",category:"Radiation Protection",difficulty:"easy",
   stem:"Which of the following best describes the ALARA principle in radiology?",
   options:["As Low As Reasonably Achievable","Always Limit All Radiation Absorption","Achieve Lower Amounts of Radiation Always","As Little As Radiologically Acceptable"],
   correct:0,
   explanation:"ALARA stands for 'As Low As Reasonably Achievable.' It is the guiding principle of radiation protection — all radiation exposure should be kept as low as possible while still achieving the diagnostic or therapeutic goal. It applies to both patients and healthcare workers."},

  {id:"q8",type:"mc",category:"Radiation Protection",difficulty:"medium",
   stem:"Which type of ionizing radiation has the greatest penetrating power?",
   options:["Gamma rays","Alpha particles","Beta particles","Neutrons at thermal energy"],
   correct:0,
   explanation:"Gamma rays have the greatest penetrating power of the common ionizing radiations. They can pass through the entire body and require dense shielding (like lead or thick concrete). Alpha particles are stopped by skin or paper; beta particles are stopped by a few millimeters of aluminum."},

  {id:"q9",type:"mc",category:"Radiation Biology",difficulty:"medium",
   stem:"What term describes the ability of radiation to cause cancer years or decades after exposure?",
   options:["Stochastic (late) effect","Deterministic (early) effect","Threshold effect","Somatic acute effect"],
   correct:0,
   explanation:"Stochastic effects are probabilistic, late effects of radiation — including cancer induction and genetic mutations. They have no threshold dose; any exposure carries some risk. The probability of occurrence increases with dose, but severity does not. Deterministic effects have thresholds and increase in severity with dose."},

  {id:"q10",type:"mc",category:"Radiation Biology",difficulty:"hard",
   stem:"Which cells are considered MOST radiosensitive according to the Law of Bergonié and Tribondeau?",
   options:["Rapidly dividing, undifferentiated cells","Slowly dividing, highly differentiated cells","Non-dividing nerve cells","Mature red blood cells"],
   correct:0,
   explanation:"The Law of Bergonié and Tribondeau states that cells are most radiosensitive when they are rapidly dividing, undifferentiated (immature), and have a long mitotic future. This is why bone marrow, gonads, and intestinal lining cells are highly radiosensitive — and why cancer cells (which divide rapidly) can be treated with radiation."},

  {id:"q11",type:"mc",category:"Radiation Syndromes",difficulty:"medium",
   stem:"The prodromal stage of Acute Radiation Syndrome (ARS) is characterized by:",
   options:["Nausea, vomiting, and fatigue occurring within hours of exposure","Complete absence of symptoms for several weeks","Permanent bone marrow failure","Immediate cardiac arrest"],
   correct:0,
   explanation:"The prodromal stage is the initial stage of ARS, occurring within minutes to hours after high-dose exposure. Symptoms include nausea, vomiting, diarrhea, and fatigue. After the prodromal stage, there is typically a latent period where the patient appears to recover before the manifest illness stage."},

  {id:"q12",type:"mc",category:"Radiation Interactions",difficulty:"hard",
   stem:"In diagnostic radiology, the Compton scattering interaction is significant because it:",
   options:["Produces scatter radiation that reduces image quality and increases patient dose","Only occurs at very high energy levels above 10 MeV","Creates radioactive isotopes in body tissue","Has no effect on soft tissue — only bone"],
   correct:0,
   explanation:"Compton scattering is the predominant interaction in soft tissue at diagnostic x-ray energies (30–150 kVp). The incident photon ejects an outer-shell electron and continues at a lower energy in a different direction — creating scatter radiation that degrades image contrast and contributes to staff and patient dose."},
];

const SCENARIOS=[
  {id:"s1",category:"Clinical Scenario",difficulty:"hard",
   title:"Emergency Exposure Case",
   setup:"A radiology technologist is reviewing a case. A worker at a nuclear facility was accidentally exposed to a whole-body radiation dose estimated at 4 Gy. He is now presenting to the radiology department 10 days post-exposure.",
   question:"Based on the dose received, which syndrome would you expect this patient to be experiencing, and what is the primary concern for his survival?",
   keyTerms:["Hematopoietic Syndrome","bone marrow","blood cells","leukopenia","infection","hemorrhage","4 Gy"],
   modelAnswer:"At 4 Gy, this patient has Hematopoietic (Bone Marrow) Syndrome. The primary concern is severe depression of blood cell production — particularly white blood cells (leukopenia) and platelets — leading to risk of fatal infection and hemorrhage during the manifest illness stage.",
   points:25},

  {id:"s2",category:"Clinical Scenario",difficulty:"medium",
   title:"Patient Education Moment",
   setup:"A patient scheduled for a chest X-ray asks you: 'I heard that X-rays damage your DNA. How does that actually happen? Should I be worried?'",
   question:"How would you explain the mechanism of radiation damage to this patient in accurate but accessible terms? Include the concept of indirect damage.",
   keyTerms:["water","free radicals","indirect","DNA","ionization","diagnostic","low dose","risk"],
   modelAnswer:"Most diagnostic x-ray damage occurs indirectly — x-rays ionize water molecules in your cells, creating unstable free radicals that can damage DNA. However, diagnostic x-ray doses are very low, and the body has repair mechanisms. The benefit of diagnosis typically far outweighs the minimal risk.",
   points:20},

  {id:"s3",category:"Clinical Scenario",difficulty:"medium",
   title:"Radiation Safety Briefing",
   setup:"You are orienting a new radiology student. They ask why radiation workers wear dosimeters and follow the ALARA principle — 'If the doses are so small, why does it matter?'",
   question:"Explain the rationale behind ALARA and stochastic effects to justify radiation protection practices for workers.",
   keyTerms:["ALARA","stochastic","no threshold","cumulative","cancer risk","occupational","dose limits","protection"],
   modelAnswer:"ALARA is justified by stochastic effects — radiation-induced cancer risk has no safe threshold. Every additional exposure adds a small probability of cancer induction. Occupational workers receive repeated exposures over a career, making cumulative dose significant. Dosimeters track exposure to ensure annual limits are not exceeded.",
   points:20},
];

function shuffle(a){return[...a].sort(()=>Math.random()-0.5)}

const HS_KEY="radquest_scores_v1";
function loadScores(){try{return JSON.parse(localStorage.getItem(HS_KEY)||"[]")}catch{return[]}}
function saveScore(e){const s=loadScores();s.push(e);s.sort((a,b)=>b.score-a.score);const t=s.slice(0,10);localStorage.setItem(HS_KEY,JSON.stringify(t));return t}
function dlCSV(scores){
  const h="Rank,Name,Score,Correct,Accuracy,Date";
  const r=scores.map((s,i)=>`${i+1},"${s.name}",${s.score},${s.correct},${s.accuracy}%,"${s.date}"`);
  const b=new Blob([[h,...r].join("\n")],{type:"text/csv"});
  const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="radquest_scores.csv";a.click();URL.revokeObjectURL(u);
}

// ── UI ATOMS ─────────────────────────────────────────────────────────────────
const Stars=()=>{
  const s=useRef(Array.from({length:80},(_,i)=>({id:i,x:Math.random()*100,y:Math.random()*100,sz:Math.random()*1.8+0.3,d:Math.random()*4,dur:1+Math.random()*3})));
  return React.createElement("div",{style:{position:"fixed",inset:0,pointerEvents:"none",overflow:"hidden"}},
    s.current.map(st=>React.createElement("div",{key:st.id,style:{position:"absolute",left:`${st.x}%`,top:`${st.y}%`,width:st.sz,height:st.sz,borderRadius:"50%",background:"#fff",opacity:0.5,animation:`twinkle ${st.dur}s ${st.d}s infinite alternate`}}))
  );
};

const Scanline=()=>React.createElement("div",{style:{position:"fixed",inset:0,pointerEvents:"none",zIndex:900,background:"repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,20,10,0.07) 2px,rgba(0,20,10,0.07) 4px)"}});
const CRT=()=>React.createElement("div",{style:{position:"fixed",inset:0,pointerEvents:"none",zIndex:901,boxShadow:"inset 0 0 100px rgba(0,0,0,0.7),inset 0 0 30px rgba(0,229,255,0.04)",borderRadius:6}});

const Px=({children,size=14,color="#00e5ff",glow=true,style={}})=>
  React.createElement("span",{style:{fontFamily:"'Courier New',monospace",fontSize:size,color,fontWeight:900,letterSpacing:2,textShadow:glow?`0 0 8px ${color},0 0 16px ${color}55`:"none",...style}},children);

const RBtn=({children,onClick,color="#00e5ff",disabled=false,style={}})=>
  React.createElement("button",{
    disabled,
    onClick:e=>{if(!disabled){sfx().click();onClick&&onClick(e)}},
    style:{background:disabled?"#0a1520":"transparent",border:`2px solid ${disabled?"#1a2530":color}`,color:disabled?"#1a2530":color,fontFamily:"'Courier New',monospace",fontWeight:900,fontSize:"0.85rem",letterSpacing:2,padding:"11px 20px",cursor:disabled?"default":"pointer",textTransform:"uppercase",textShadow:disabled?"none":`0 0 8px ${color}`,boxShadow:disabled?"none":`0 0 12px ${color}33,inset 0 0 12px ${color}0a`,transition:"all 0.15s",...style},
    onMouseEnter:e=>{if(!disabled){e.currentTarget.style.background=`${color}18`;e.currentTarget.style.boxShadow=`0 0 24px ${color}77,inset 0 0 20px ${color}18`}},
    onMouseLeave:e=>{if(!disabled){e.currentTarget.style.background="transparent";e.currentTarget.style.boxShadow=`0 0 12px ${color}33,inset 0 0 12px ${color}0a`}},
  },children);

const DiffBadge=({d})=>{
  const map={easy:{c:"#00e5b4",l:"EASY"},medium:{c:"#f59e0b",l:"MED"},hard:{c:"#ff4060",l:"HARD"}};
  const m=map[d]||map.medium;
  return React.createElement("span",{style:{background:`${m.c}18`,border:`1px solid ${m.c}66`,color:m.c,padding:"2px 8px",fontSize:"0.6rem",letterSpacing:2,fontFamily:"'Courier New',monospace",fontWeight:900}},m.l);
};

// ── MAIN APP ─────────────────────────────────────────────────────────────────
function App(){
  const[screen,setScreen]=useState("home"); // home|setup|game|scenario|result|scores
  const[nameInput,setNameInput]=useState("");
  const[playerName,setPlayerName]=useState("");
  const[questions,setQuestions]=useState([]);
  const[qIdx,setQIdx]=useState(0);
  const[score,setScore]=useState(0);
  const[correct,setCorrect]=useState(0);
  const[streak,setStreak]=useState(0);
  const[bestStreak,setBestStreak]=useState(0);
  const[selected,setSelected]=useState(null);
  const[answered,setAnswered]=useState(false);
  const[isCorrect,setIsCorrect]=useState(null);
  const[lives,setLives]=useState(3);
  const[xp,setXp]=useState(0);
  const[combo,setCombo]=useState(0);
  const[flash,setFlash]=useState(null);
  const[shake,setShake]=useState(false);
  const[showStreak,setShowStreak]=useState(false);
  const[particles,setParticles]=useState([]);
  const[highScores,setHighScores]=useState([]);
  const[lastResult,setLastResult]=useState(null);
  const[currentScenario,setCurrentScenario]=useState(null);
  const[scenarioAnswer,setScenarioAnswer]=useState("");
  const[scenarioResult,setScenarioResult]=useState(null);
  const[scenarioFeedback,setScenarioFeedback]=useState("");
  const[scenarioLoading,setScenarioLoading]=useState(false);
  const[modeQueue,setModeQueue]=useState([]); // mixed queue of mc+scenarios
  const[modeIdx,setModeIdx]=useState(0);
  const[totalItems,setTotalItems]=useState(0);
  const particleId=useRef(0);
  const nameRef=useRef(null);

  useEffect(()=>{setHighScores(loadScores())},[]);
  useEffect(()=>{if(screen==="setup"&&nameRef.current)nameRef.current.focus()},[screen]);

  const startGame=()=>{
    if(!nameInput.trim())return;
    sfx().click();
    setPlayerName(nameInput.trim());
    // Build mixed queue: shuffle all MC questions + 2 scenarios interspersed
    const mcQ=shuffle(QUESTIONS).map(q=>({...q,_type:"mc"}));
    const scQ=shuffle(SCENARIOS).slice(0,2).map(s=>({...s,_type:"scenario"}));
    // Insert scenarios at positions 4 and 9
    const queue=[...mcQ];
    queue.splice(4,0,scQ[0]);
    if(scQ[1])queue.splice(9,0,scQ[1]);
    setModeQueue(queue);
    setModeIdx(0);
    setTotalItems(queue.length);
    setScore(0);setCorrect(0);setStreak(0);setBestStreak(0);
    setXp(0);setCombo(0);setSelected(null);setAnswered(false);
    setIsCorrect(null);setLives(3);setScenarioAnswer("");
    setScenarioResult(null);setScenarioFeedback("");
    setCurrentScenario(null);
    setScreen("loading");
    setTimeout(()=>{
      loadItem(queue,0);
    },800);
  };

  const loadItem=(queue,idx)=>{
    if(idx>=queue.length){endGame();return}
    const item=queue[idx];
    setModeIdx(idx);
    setSelected(null);setAnswered(false);setIsCorrect(null);
    setScenarioAnswer("");setScenarioResult(null);setScenarioFeedback("");
    if(item._type==="scenario"){
      setCurrentScenario(item);
      sfx().scenario();
      setScreen("scenario");
    } else {
      setCurrentScenario(null);
      setScreen("game");
    }
  };

  const spawnParticles=(x,y,good)=>{
    const colors=good?["#00e5ff","#00ff88","#ffff00","#ff88ff"]:["#ff4060","#ff8800"];
    const newP=Array.from({length:good?16:6},(_,i)=>({
      id:particleId.current++,x,y,
      dx:(Math.random()-0.5)*280,dy:(Math.random()-1.2)*240,
      color:colors[i%colors.length],size:good?5+Math.random()*8:4+Math.random()*5,
      char:good?"☢":"✕",
    }));
    setParticles(p=>[...p,...newP]);
    setTimeout(()=>setParticles(p=>p.filter(pt=>!newP.find(n=>n.id===pt.id))),900);
  };

  const handleAnswer=(idx,event)=>{
    if(answered)return;
    const q=modeQueue[modeIdx];
    const good=idx===q.correct;
    if(event){const r=event.currentTarget.getBoundingClientRect();spawnParticles(r.left+r.width/2,r.top+r.height/2,good)}
    setSelected(idx);setAnswered(true);setIsCorrect(good);
    setFlash(good?"good":"bad");setTimeout(()=>setFlash(null),300);
    if(good){
      const nc=combo+1,ns=streak+1;
      const gained=nc>=3?20:10;
      setScore(s=>s+1);setCorrect(c=>c+1);setXp(x=>x+gained);
      setStreak(ns);setCombo(nc);if(ns>bestStreak)setBestStreak(ns);
      if(ns>=3){sfx().streak?sfx().click():sfx().correct();setShowStreak(true);setTimeout(()=>setShowStreak(false),1400)}
      else sfx().correct();
    } else {
      setStreak(0);setCombo(0);
      const nl=lives-1;setLives(nl);
      if(nl<=0)sfx().alarm();else sfx().wrong();
      setShake(true);setTimeout(()=>setShake(false),500);
    }
  };

  const submitScenario=async()=>{
    if(!scenarioAnswer.trim()||scenarioLoading)return;
    setScenarioLoading(true);sfx().radiation();
    const s=currentScenario;
    const prompt=`You are an expert radiology educator evaluating a student answer for a RAD 100 course.

SCENARIO: ${s.setup}
QUESTION: ${s.question}
KEY TERMS EXPECTED: ${s.keyTerms.join(", ")}
MODEL ANSWER: ${s.modelAnswer}

STUDENT ANSWER: "${scenarioAnswer}"

Evaluate the student's answer. Award points out of ${s.points} based on:
- Accuracy of medical/radiological concepts (40%)
- Use of correct terminology (30%)
- Clinical reasoning and completeness (30%)

Return ONLY valid JSON:
{"points": <number 0-${s.points}>, "feedback": "<2-3 sentence specific feedback>", "correct_terms_used": ["term1","term2"], "missed_concepts": ["concept1"]}`;

    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,messages:[{role:"user",content:prompt}]})
      });
      const data=await res.json();
      const text=data.content?.find(b=>b.type==="text")?.text||"";
      const clean=text.replace(/```json|```/g,"").trim();
      const result=JSON.parse(clean);
      setScenarioResult(result);
      setScenarioFeedback(result.feedback);
      setXp(x=>x+result.points);
      setScore(sc=>sc+Math.round(result.points/s.points));
      if(result.points>=s.points*0.7)sfx().correct();else sfx().wrong();
    }catch{
      setScenarioResult({points:0,feedback:"Could not connect to AI evaluator. Ask your instructor to review manually.",correct_terms_used:[],missed_concepts:[]});
    }
    setScenarioLoading(false);
    setAnswered(true);
  };

  const nextItem=()=>{
    sfx().click();
    const nextIdx=modeIdx+1;
    if(nextIdx>=modeQueue.length||lives<=0){endGame();return}
    loadItem(modeQueue,nextIdx);
  };

  const endGame=useCallback(()=>{
    const total=modeQueue.filter(q=>q._type==="mc").length;

    </div>
    <div style={{border:"1px solid #ffd70022",background:"rgba(255,215,0,0.02)",marginBottom:12}}>
      <div style={{display:"grid",gridTemplateColumns:"28px 1fr 50px 50px 40px",gap:4,padding:"8px 12px",borderBottom:"1px solid #ffd70022",background:"rgba(255,215,0,0.04)"}}>
        {["#","NAME","SCORE","ACC","DATE"].map(h=><Px key={h} size={7} color="#ffd700" style={{letterSpacing:1}}>{h}</Px>)}
      </div>
      {highScores.length===0&&<div style={{padding:"28px",textAlign:"center"}}><Px size={9} color="#223" style={{letterSpacing:2}}>NO SCORES YET</Px></div>}
      {highScores.map((s,i)=>{
        const isMe=lastResult&&s.name===lastResult.name&&s.score===lastResult.score&&s.date===lastResult.date;
        return(
        <div key={i} style={{display:"grid",gridTemplateColumns:"28px 1fr 50px 50px 40px",gap:4,padding:"8px 12px",borderBottom:"1px solid #ffffff06",background:isMe?"rgba(0,229,255,0.04)":"",borderLeft:isMe?"2px solid #00e5ff":"2px solid transparent"}}>
          <Px size={8} color={i<3?RANK_COLORS[i]:"#223"}>{i+1}</Px>
          <Px size={8} color={isMe?"#00e5ff":"#8899aa"} style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}{isMe?" ◀":""}</Px>
          <Px size={8} color="#ffd700">{s.score}</Px>
          <Px size={8} color="#00e5ff">{s.accuracy}%</Px>
          <Px size={7} color="#334">{s.date}</Px>
        </div>);
      })}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
      <RBtn onClick={()=>dlCSV(highScores)} color="#00e5ff" disabled={highScores.length===0} style={{fontSize:"0.72rem",letterSpacing:2}}>⬇ DOWNLOAD CSV</RBtn>
      <RBtn onClick={()=>{if(window.confirm("Clear all scores?")){localStorage.removeItem(HS_KEY);setHighScores([]);sfx().click()}}} color="#ff4060" disabled={highScores.length===0} style={{fontSize:"0.72rem",letterSpacing:2}}>🗑 CLEAR</RBtn>
    </div>
    <RBtn onClick={()=>setScreen("home")} color="#ff4060" style={{width:"100%",fontSize:"0.75rem",letterSpacing:2}}>⌂ HOME</RBtn>
  </div>
  )}

</div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
